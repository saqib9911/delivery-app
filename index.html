<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POR Delivery - PHA Officers Residentia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Nastaliq+Urdu&display=swap');
        
        :root { --primary: #059669; --dark-bg: #0f172a; }
        body { font-family: 'Outfit', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .urdu { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.2; }
        
        /* Dark Mode Fixes */
        body.dark { background-color: var(--dark-bg); color: white; }
        .dark .bg-white { background-color: #1e293b; color: white; border: 1px solid #334155; }
        .dark textarea { background-color: #0f172a !important; color: #ffffff !important; border: 1px solid #475569; }
        .dark textarea::placeholder { color: #94a3b8; }
        .dark .text-slate-800, .dark h2 { color: #f1f5f9; }
        .dark #sidebar { background-color: #1e293b; color: white; }

        /* Splash Animation */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: 1s ease;
        }
        .splash-box { text-align: center; animation: fadeIn 1.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glow-line { height: 3px; width: 160px; background: #fbbf24; margin: 15px auto; border-radius: 50px; box-shadow: 0 0 10px #fbbf24; }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; right: -100%; width: 300px; height: 100%;
            background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.3); overflow-y: auto;
        }
        #sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; backdrop-filter: blur(4px); }

        /* UI Elements */
        #map { height: 320px; width: 100%; border-radius: 30px; border: 3px solid var(--primary); z-index: 1; }
        .btn-phase { transition: 0.3s; font-weight: 800; border: 2px solid #e2e8f0; }
        .dark .btn-phase { border-color: #334155; color: #94a3b8; }
        .service-tag { background: #f1f5f9; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; font-weight: 600; font-size: 14px; }
        .dark .service-tag { background: #334155; color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50" onload="initApp()">

    <div id="splash">
        <div class="splash-box">
            <h1 class="text-7xl font-black text-white italic tracking-tighter">POR</h1>
            <p class="text-2xl font-bold text-emerald-200 tracking-[0.3em] mt-1">DELIVERY</p>
            <div class="glow-line"></div>
            <p class="text-[12px] text-white/90 font-bold uppercase tracking-[0.1em] px-6">
                PHA Officers Residentia<br>Kuri Road, Islamabad
            </p>
        </div>
    </div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-2xl italic text-emerald-600">POR HUB</h3>
            <button onclick="toggleMenu()"><i class="fas fa-times text-2xl text-gray-300"></i></button>
        </div>
        <div class="space-y-4">
            <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">About Services</h4>
            <div class="service-tag"><i class="fas fa-shopping-basket mr-3 text-emerald-600"></i> Groceries</div>
            <div class="service-tag"><i class="fas fa-faucet mr-3 text-emerald-600"></i> Plumber</div>
            <div class="service-tag"><i class="fas fa-bolt mr-3 text-emerald-600"></i> Electrician</div>
            <div class="service-tag"><i class="fas fa-paint-roller mr-3 text-emerald-600"></i> Painter</div>
            <div class="service-tag"><i class="fas fa-car mr-3 text-emerald-600"></i> Rent a Car</div>
            <div class="p-4 bg-emerald-50 dark:bg-emerald-900/10 rounded-2xl mt-4 border border-emerald-100">
                <p class="text-xs font-bold text-emerald-800 dark:text-emerald-400">EasyPaisa / Help</p>
                <a href="tel:03325047836" class="text-lg font-black text-emerald-700 dark:text-white">03325047836</a>
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-[1000]">
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="bg-black/30 backdrop-blur-md w-11 h-11 rounded-2xl text-white flex items-center justify-center border border-white/10 shadow-lg">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="toggleLang()" class="bg-black/30 backdrop-blur-md px-4 rounded-2xl text-white text-[11px] font-black border border-white/10 shadow-lg" id="langBtn">URDU</button>
        </div>
        <button onclick="toggleMenu()" class="bg-emerald-600 text-white w-11 h-11 rounded-2xl flex items-center justify-center shadow-xl">
            <i class="fas fa-bars-staggered"></i>
        </button>
    </nav>

    <header class="bg-emerald-950 text-white pt-28 pb-48 px-8 rounded-b-[4rem] text-center relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-5xl font-black italic tracking-tighter" id="mainTitle">POR Delivery</h1>
            <p class="text-[13px] font-bold text-emerald-400 tracking-[0.2em] mt-3 uppercase leading-relaxed" id="subAddress">PHA OFFICERS RESIDENTIA KURI ISLAMABAD</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-36 relative z-20 pb-10">
        
        <div class="bg-white rounded-[2.5rem] shadow-2xl p-7 mb-8 border-b-[8px] border-emerald-900">
            <h2 class="text-2xl font-black mb-6 text-slate-800" id="listHeading">LIST ANY SERVICE</h2>
            
            <div class="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl mb-6">
                <button id="p1" onclick="setPhase(1)" class="flex-1 py-3 rounded-xl text-xs font-black btn-phase bg-white text-slate-400">Phase 1</button>
                <button id="p2" onclick="setPhase(2)" class="flex-1 py-3 rounded-xl text-xs font-black btn-phase ml-1 bg-white text-slate-400">Phase 2</button>
            </div>
            
            <textarea id="orderBox" rows="4" 
                class="w-full p-5 rounded-[1.5rem] mb-6 font-bold text-sm bg-slate-50 text-slate-800 focus:ring-2 focus:ring-emerald-500 shadow-inner border-none transition-all placeholder:text-slate-300" 
                placeholder="Write groceries, plumber, or car rent details..."></textarea>
            
            <button onclick="sendOrder()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-[2rem] shadow-[0_15px_30px_rgba(5,150,105,0.4)] flex items-center justify-center active:scale-95 transition">
                <i class="fab fa-whatsapp mr-3 text-3xl"></i> <span id="btnLabel">SEND REQUEST</span>
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] p-4 shadow-2xl mb-8">
            <div class="flex justify-between items-center mb-3 px-2">
                <span id="distBadge" class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Tracking Resident...</span>
                <button onclick="requestGPS()" class="text-emerald-500 bg-emerald-50 w-9 h-9 rounded-full flex items-center justify-center shadow-sm"><i class="fas fa-crosshairs"></i></button>
            </div>
            <div id="map"></div>
        </div>
    </main>

    <script>
        let map, userMarker, userCoords = null, phase = 0, dist = "0", isDark = false, lang = 'en';
        const base = [33.6550, 73.1650];

        function initApp() {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 1000);
            }, 3000);
            initMap();
            setPhase(0);
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleLang() {
            lang = lang === 'en' ? 'ur' : 'en';
            const isUr = lang === 'ur';
            document.getElementById('mainTitle').innerText = isUr ? "پی او آر ڈیلیوری" : "POR Delivery";
            document.getElementById('subAddress').innerText = isUr ? "پی ایچ اے آفیسرز ریزیڈنشیا کڑی اسلام آباد" : "PHA OFFICERS RESIDENTIA KURI ISLAMABAD";
            document.getElementById('listHeading').innerText = isUr ? "سروس کی لسٹ بنائیں" : "LIST ANY SERVICE";
            document.getElementById('btnLabel').innerText = isUr ? "آرڈر بھیجیں" : "SEND REQUEST";
            document.getElementById('langBtn').innerText = isUr ? "ENGLISH" : "URDU";
            document.body.classList.toggle('urdu', isUr);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function initMap() {
            const street = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png');
            const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
            map = L.map('map', { zoomControl: false, layers: [street] }).setView(base, 15);
            L.control.layers({ "Standard": street, "Satellite": sat }, null, { position: 'topright' }).addTo(map);
            L.marker(base).addTo(map).bindPopup("POR Base").openPopup();
            requestGPS();
        }

        function requestGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    userCoords = [p.coords.latitude, p.coords.longitude];
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.circleMarker(userCoords, { color: '#059669', radius: 8, fillOpacity: 1 }).addTo(map);
                    dist = (map.distance(base, userCoords) / 1000).toFixed(2);
                    document.getElementById('distBadge').innerText = dist + " KM FROM BASE";
                    map.fitBounds(L.latLngBounds([base, userCoords]), { padding: [60, 60] });
                }, null, { enableHighAccuracy: true });
            }
        }

        function setPhase(p) {
            phase = p;
            const b1 = document.getElementById('p1');
            const b2 = document.getElementById('p2');
            b1.className = "flex-1 py-3 rounded-xl text-xs font-black btn-phase bg-white text-slate-400";
            b2.className = "flex-1 py-3 rounded-xl text-xs font-black btn-phase ml-1 bg-white text-slate-400";
            if(p === 1) b1.className = "flex-1 py-3 rounded-xl text-xs font-black btn-phase bg-emerald-600 text-white shadow-lg";
            if(p === 2) b2.className = "flex-1 py-3 rounded-xl text-xs font-black btn-phase ml-1 bg-emerald-600 text-white shadow-lg";
        }

        function sendOrder() {
            const list = document.getElementById('orderBox').value;
            if(!list || phase === 0) return alert("Please select Phase and list your requirements!");
            const loc = userCoords ? `https://www.google.com/maps?q=${userCoords[0]},${userCoords[1]}` : "Location not shared";
            
            // WHATSAPP MESSAGE (WITH EASYPAISA FIXED)
            const msg = encodeURIComponent(
                `📋 *NEW POR SERVICE REQUEST*\n` +
                `━━━━━━━━━━━━━━━\n` +
                `🏠 *Residentia:* Phase ${phase}\n` +
                `📏 *Distance:* ${dist} KM\n` +
                `🛠️ *Service List:* \n${list}\n\n` +
                `📍 *Maps:* ${loc}\n` +
                `━━━━━━━━━━━━━━━\n` +
                `💳 *EasyPaisa:* 03325047836\n` +
                `👤 *Name:* Saqib Zaheer\n` +
                `━━━━━━━━━━━━━━━\n` +
                `_PHA Officers Residentia Kuri Islamabad_`
            );
            window.open(`https://wa.me/923325047836?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
