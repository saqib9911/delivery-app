<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POR Delivery - PHA Officers Residentia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Noto+Nastaliq+Urdu&display=swap');
        
        :root { --primary: #059669; }
        body { font-family: 'Outfit', sans-serif; transition: 0.3s; }
        .urdu { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.2; }
        
        /* Dark Mode Styles */
        body.dark { background-color: #0f172a; color: white; }
        .dark .bg-white { background-color: #1e293b; color: white; }
        .dark .text-slate-800 { color: #f1f5f9; }
        .dark textarea { background-color: #334155; color: white; border: 1px solid #475569; }
        .dark #sidebar { background-color: #1e293b; color: white; }
        .dark .service-pill { background-color: #334155; color: #cbd5e1; border-color: #475569; }

        /* Splash */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: 0.8s;
        }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; right: -100%; width: 300px; height: 100%;
            background: white; z-index: 2000; transition: 0.5s; padding: 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.2);
        }
        #sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; backdrop-filter: blur(4px); }

        #map { height: 320px; width: 100%; border-radius: 25px; border: 3px solid var(--primary); z-index: 1; }
        .service-pill { background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; font-size: 13px; }
    </style>
</head>
<body class="bg-slate-50" onload="initApp()">

    <div id="splash">
        <div class="text-center text-white scale-110 transition">
            <h1 class="text-7xl font-black italic">POR</h1>
            <p class="tracking-[0.4em] font-bold text-emerald-300">RESIDENTIA</p>
        </div>
    </div>

    <div id="sidebar">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-xl italic text-emerald-600">POR HUB</h3>
            <button onclick="toggleMenu()"><i class="fas fa-times text-xl"></i></button>
        </div>
        <section class="space-y-4">
            <h4 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Services List</h4>
            <div class="service-pill"><i class="fas fa-shopping-cart mr-3"></i> Groceries</div>
            <div class="service-pill"><i class="fas fa-faucet mr-3"></i> Plumber</div>
            <div class="service-pill"><i class="fas fa-bolt mr-3"></i> Electrician</div>
            <div class="service-pill"><i class="fas fa-car mr-3"></i> Rent a Car</div>
            <hr class="opacity-10">
            <div class="p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl">
                <p class="text-xs font-bold">Helpline</p>
                <a href="tel:03325047836" class="text-emerald-600 font-black">03325047836</a>
            </div>
        </section>
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="fixed top-0 w-full p-5 flex justify-between items-center z-[1000]">
        <div class="flex gap-2">
            <button onclick="toggleTheme()" class="bg-black/20 backdrop-blur-md w-10 h-10 rounded-xl text-white flex items-center justify-center">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="toggleLang()" class="bg-black/20 backdrop-blur-md px-3 rounded-xl text-white text-[10px] font-bold" id="langBtn">URDU</button>
        </div>
        <button onclick="toggleMenu()" class="bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <header class="bg-emerald-950 text-white pt-24 pb-36 px-8 rounded-b-[3.5rem] text-center shadow-2xl">
        <h1 class="text-4xl font-black italic" id="mainTitle">POR Delivery</h1>
        <p class="text-[9px] opacity-60 tracking-[0.3em] font-bold mt-2 uppercase">PHA Officers Residentia</p>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-24 relative z-20">
        
        <div class="bg-white rounded-[2.5rem] p-4 shadow-xl mb-6 transition">
            <div class="flex justify-between items-center mb-3 px-2">
                <span id="distBadge" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">GPS Ready</span>
                <button onclick="requestGPS()" class="text-emerald-500"><i class="fas fa-location-crosshairs"></i></button>
            </div>
            <div id="map"></div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-6 mb-10 border-b-4 border-emerald-600">
            <h2 class="text-lg font-black mb-4 text-slate-800" id="listHeading">LIST ANY SERVICE</h2>
            
            <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl mb-6">
                <button id="p1" onclick="setPhase(1)" class="flex-1 py-2 rounded-lg text-xs font-bold transition">Phase 1</button>
                <button id="p2" onclick="setPhase(2)" class="flex-1 py-2 rounded-lg text-xs font-bold transition ml-1">Phase 2</button>
            </div>
            
            <textarea id="orderBox" rows="4" 
                class="w-full p-4 rounded-2xl mb-6 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-inner" 
                placeholder="Mention items, plumber, or car rent details..."></textarea>
            
            <button onclick="sendOrder()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg flex items-center justify-center active:scale-95 transition">
                <i class="fab fa-whatsapp mr-3 text-3xl"></i> <span id="btnLabel">SEND REQUEST</span>
            </button>
        </div>
    </main>

    <script>
        let map, userMarker, userCoords = null, phase = 0, dist = "0", isDark = false, lang = 'en';
        const base = [33.6550, 73.1650];

        function initApp() {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
            }, 2500);
            initMap();
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleLang() {
            lang = lang === 'en' ? 'ur' : 'en';
            const isUr = lang === 'ur';
            document.getElementById('mainTitle').innerText = isUr ? "پی او آر ڈیلیوری" : "POR Delivery";
            document.getElementById('listHeading').innerText = isUr ? "سروس کی لسٹ بنائیں" : "LIST ANY SERVICE";
            document.getElementById('btnLabel').innerText = isUr ? "آرڈر بھیجیں" : "SEND REQUEST";
            document.getElementById('langBtn').innerText = isUr ? "ENGLISH" : "URDU";
            document.body.classList.toggle('urdu', isUr);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function initMap() {
            const street = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png');
            const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
            map = L.map('map', { zoomControl: false, layers: [street] }).setView(base, 15);
            L.control.layers({ "Map": street, "Satellite": sat }).addTo(map);
            L.marker(base).addTo(map).bindPopup("POR Base").openPopup();
            requestGPS();
        }

        function requestGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    userCoords = [p.coords.latitude, p.coords.longitude];
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.circleMarker(userCoords, { color: '#059669', radius: 8, fillOpacity: 1 }).addTo(map);
                    dist = (map.distance(base, userCoords) / 1000).toFixed(2);
                    document.getElementById('distBadge').innerText = dist + " KM AWAY";
                });
            }
        }

        function setPhase(p) {
            phase = p;
            document.getElementById('p1').className = "flex-1 py-2 rounded-lg text-xs font-bold text-gray-400";
            document.getElementById('p2').className = "flex-1 py-2 rounded-lg text-xs font-bold text-gray-400 ml-1";
            document.getElementById('p'+p).className = "flex-1 py-2 rounded-lg text-xs font-black bg-emerald-600 text-white shadow-md";
        }

        function sendOrder() {
            const list = document.getElementById('orderBox').value;
            if(!list || phase === 0) return alert("Select Phase & List Services!");
            const loc = userCoords ? `https://www.google.com/maps?q=${userCoords[0]},${userCoords[1]}` : "Not Shared";
            const msg = encodeURIComponent(`📦 *POR SERVICE REQUEST*\n🏠 Residentia: Phase ${phase}\n📏 Dist: ${dist} KM\n📝 List: ${list}\n📍 Map: ${loc}`);
            window.open(`https://wa.me/923325047836?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
