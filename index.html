<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saqib Delivery - PHA Kuri Road</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Nastaliq+Urdu&display=swap');
        body { font-family: 'Outfit', sans-serif; transition: 0.3s; background-color: #f1f5f9; }
        .dark { background-color: #0f172a; color: white; }
        .dark textarea { background-color: #1e293b !important; color: white !important; border-color: #334155 !important; }
        .urdu { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.2; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.9); border-color: rgba(255, 255, 255, 0.1); }
        #map { height: 350px; width: 100%; border-radius: 25px; border: 3px solid #10b981; z-index: 1; }
        .dist-info { background: #3b82f6; color: white; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body class="pb-10" onload="initMap()">

    <div class="fixed top-4 left-4 right-4 z-[1000] flex justify-between items-center">
        <button onclick="document.body.classList.toggle('dark')" class="bg-white dark:bg-slate-800 shadow-xl p-3 rounded-full text-yellow-500"><i class="fas fa-adjust"></i></button>
        <button onclick="toggleLanguage()" class="bg-white dark:bg-slate-800 shadow-xl px-5 py-2 rounded-full font-bold text-green-600 border border-green-500"><span id="langBtn">اردو</span></button>
    </div>

    <header class="bg-gradient-to-br from-green-900 to-emerald-600 text-white pt-16 pb-32 px-6 rounded-b-[4rem] text-center shadow-2xl">
        <h1 class="text-3xl font-black italic" id="title">Saqib Delivery Service</h1>
        <p class="text-[10px] mt-2 font-bold opacity-80">PHA Officers Residential - Phase 1 & 2</p>
    </header>

    <main class="max-w-md mx-auto px-6 -mt-24 relative z-20">
        
        <div class="glass-card rounded-[2.5rem] p-4 mb-6 shadow-2xl">
            <div class="flex justify-between items-center mb-3 px-2">
                <h3 class="text-xs font-bold dark:text-white" id="mapLabel">📍 PHA Tracker (Live)</h3>
                <div id="distanceText" class="dist-info">Distance: --</div>
            </div>
            
            <div id="map"></div>
            
            <p class="text-[9px] text-gray-500 mt-2 text-center" id="mapHint">Map will auto-zoom to your house once GPS is allowed.</p>
        </div>

        <div class="glass-card rounded-[2.5rem] shadow-2xl p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold dark:text-white" id="orderHeader">Create Order</h2>
                <div class="flex bg-gray-100 dark:bg-slate-800 p-1 rounded-xl">
                    <button id="p1" onclick="setPhase(1)" class="px-3 py-1 rounded-lg text-[10px] font-bold dark:text-gray-400">P-1</button>
                    <button id="p2" onclick="setPhase(2)" class="px-3 py-1 rounded-lg text-[10px] font-bold dark:text-gray-400">P-2</button>
                </div>
            </div>

            <textarea id="orderList" rows="5" 
                class="w-full p-5 border-2 border-slate-100 rounded-[2rem] outline-none focus:border-green-500 mb-6 text-gray-800 font-medium" 
                placeholder="Enter items here..."></textarea>
            
            <button onclick="sendWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-[2.5rem] shadow-xl flex items-center justify-center active:scale-95 transition">
                <i class="fab fa-whatsapp mr-3 text-3xl"></i> <span id="sendBtnText">Confirm Order</span>
            </button>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl flex justify-between items-center">
            <div>
                <p class="text-pink-500 font-bold text-[10px] uppercase">EasyPaisa</p>
                <h3 class="text-2xl font-mono font-bold">03325047836</h3>
                <p class="text-xs text-gray-400">Saqib Zaheer</p>
            </div>
            <i class="fas fa-wallet text-4xl text-white/10"></i>
        </div>
    </main>

    <script>
        let currentLang = 'en';
        let map, userMarker, line;
        let userCoords = null;
        let selectedPhase = 0;
        let finalDistance = "0";

        const saqibPos = [33.6550, 73.1650]; // PHA Kuri Road

        function initMap() {
            // Updated Tile Layer (CartoDB Voyager) - No 403 Errors
            map = L.map('map').setView(saqibPos, 15);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            // Saqib Base Marker
            L.marker(saqibPos).addTo(map).bindPopup("<b>Saqib Services</b>").openPopup();

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateLoc, err => {
                    document.getElementById('distanceText').innerText = "GPS Permission Required";
                }, { enableHighAccuracy: true });
            }
        }

        function updateLoc(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            userCoords = [lat, lng];

            if (userMarker) map.removeLayer(userMarker);
            if (line) map.removeLayer(line);

            // Customer Marker
            userMarker = L.circleMarker(userCoords, {
                color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.9, radius: 8
            }).addTo(map).bindPopup("Your House").openPopup();

            // Draw line between Saqib and Customer
            line = L.polyline([saqibPos, userCoords], {color: '#10b981', weight: 2, dashArray: '5, 10'}).addTo(map);

            // Calculate Distance
            const d = (map.distance(saqibPos, userCoords) / 1000).toFixed(2);
            finalDistance = d;
            document.getElementById('distanceText').innerText = d + " KM Away";

            // Fit map to show both
            map.fitBounds(L.latLngBounds([saqibPos, userCoords]), { padding: [50, 50] });
        }

        function setPhase(p) {
            selectedPhase = p;
            document.getElementById('p1').className = "px-3 py-1 rounded-lg text-[10px] font-bold dark:text-gray-400";
            document.getElementById('p2').className = "px-3 py-1 rounded-lg text-[10px] font-bold dark:text-gray-400";
            document.getElementById('p'+p).className = "px-3 py-1 rounded-lg text-[10px] font-bold bg-green-600 text-white shadow-md";
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ur' : 'en';
            const isUr = currentLang === 'ur';
            document.getElementById('title').innerText = isUr ? "ثاقب ڈیلیوری سروس" : "Saqib Delivery Service";
            document.getElementById('mapLabel').innerText = isUr ? "📍 لائیو فاصلہ ٹریکر" : "📍 PHA Tracker (Live)";
            document.getElementById('orderHeader').innerText = isUr ? "آرڈر لسٹ بنائیں" : "Create Order";
            document.getElementById('sendBtnText').innerText = isUr ? "آرڈر کنفرم کریں" : "Confirm Order";
            document.getElementById('orderList').placeholder = isUr ? "سامان کی لسٹ لکھیں..." : "Enter items here...";
            document.getElementById('langBtn').innerText = isUr ? "English" : "اردو";
            document.body.classList.toggle('urdu', isUr);
        }

        function sendWhatsApp() {
            const list = document.getElementById('orderList').value;
            if(!list.trim() || selectedPhase === 0) return alert("Select Phase and enter list!");

            const locLink = userCoords ? `https://www.google.com/maps?q=${userCoords[0]},${userCoords[1]}` : "Not Shared";
            
            const msg = encodeURIComponent(
                `🛒 *NEW PHA ORDER*\n` +
                `━━━━━━━━━━━━━━━\n` +
                `🏠 *Phase:* ${selectedPhase}\n` +
                `📏 *Distance:* ${finalDistance} KM\n` +
                `📝 *Items:* \n${list}\n\n` +
                `📍 *Maps Link:* ${locLink}\n` +
                `💳 *EasyPaisa:* 03325047836\n` +
                `━━━━━━━━━━━━━━━`
            );
            window.open(`https://wa.me/923325047836?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
